<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>TurboWasm</title>
    <link rel="icon" type="image/webp" href="./favicon.webp">
    <link rel="stylesheet" href="./benchmark.css" type="text/css" media="screen">
</head>
<body>
    <div id="ui-overlay">
        <div id="top-left">
            <button id="import-sb3">Import sb3</button>
            <input type="file" id="file-input" accept=".sb3" style="display: none;">
        </div>
        <div id="fps-display">FPS: <span id="fps-value">0</span></div>
    </div>

    <div id="stage-container">
        <canvas id="scratch-stage"></canvas>
    </div>

    <div id="controls">
        <button id="run-btn" title="Run">▶</button>
        <button id="stop-btn" title="Stop">■</button>
    </div>

    <div id="footer">
        <p>TurboWasm is a mod for TurboWarp that achieves faster execution than TurboWarp by utilizing compile to WebAssembly</p>
    </div>

    <script src="./scratch-storage.js"></script>
    <script src="./scratch-render.js"></script>
    <script src="./scratch-svg-renderer.js"></script>
    <script src="./benchmark.js"></script>
</body>
</html>
